<div class="container py-4">

  <h3 class="fw-bold mb-4">Giỏ hàng của bạn</h3>

  <div class="row g-4">

    <!-- LEFT: CART LIST -->
    <div class="col-lg-8">

      <!-- HEADER -->
      <div class="card shadow-sm border-0 mb-3">
        <div class="card-body d-flex align-items-center fw-semibold">

          <div class="form-check me-3">
            <input class="form-check-input"
                   type="checkbox"
                   [checked]="isAllSelected"
                   (change)="toggleSelectAll($event)">
          </div>

          <div class="flex-grow-1">Sản phẩm</div>
          <div class="text-center" style="width:120px;">Đơn giá</div>
          <div class="text-center" style="width:140px;">Số lượng</div>
          <div class="text-center" style="width:120px;">Thành tiền</div>
          <div style="width:80px;" class="text-center">Xóa</div>

        </div>
      </div>

      <!-- LIST -->
      <div class="card shadow-sm border-0">

        <div class="card-body p-0" 
              *ngIf="cart?.cartItems?.length; else emptyCart"
        >
              <div 
                class="d-flex align-items-center border-bottom p-3"
                *ngFor="let item of cart?.cartItems"
              >

                <!-- CHECK -->
                <div class="form-check me-3">
                  <input class="form-check-input"
                         type="checkbox"
                         [(ngModel)]="item.selected"
                          (change)="onItemSelectChange()">
                         
                </div>

                <!-- PRODUCT -->
                <div class="d-flex align-items-center flex-grow-1 gap-3">

                    <img
                      [src]="'https://localhost:7271' + item.product?.imageUrl"
                      alt=""
                      class="product-image"
                      style="width: 50px;"
                    >

                  <div class="fw-semibold">
                    {{item.product?.productName}}
                  </div>

                </div>

                <!-- PRICE -->
                <div class="text-center text-muted" style="width:120px;">
                  {{item.product?.sellPrice}} đ
                </div>

                <!-- QTY -->
                <div class="text-center" style="width:140px;">

                  <div class="input-group input-group-sm justify-content-center">

                    <button class="btn btn-outline-secondary"
                            (click)="decreaseQuantity(item)"  
                    >
                      -
                    </button>

                    <input class="form-control text-center"
                           style="max-width:50px"
                           [value]="item.quantity"
                           readonly>

                    <button class="btn btn-outline-secondary" 
                              (click)="increaseQuantity(item)"
                    >
                      +
                    </button>

                  </div>

                </div>

                <!-- TOTAL -->
                <div class="text-center fw-bold text-danger" style="width:120px;">
                  {{item.product?.sellPrice}} đ
                </div>

                <!-- DELETE -->
                <div class="text-center" style="width:80px;">
                  <button class="btn btn-sm btn-outline-danger"
                          (click)="removeItem(item.cartItemId)"
                  >
                    Xóa
                  </button>
                </div>

              </div>
        </div>
        <ng-template #emptyCart>
          <div class="text-center py-5">
            <p class="text-muted">Giỏ hàng trống</p>
          </div>
        </ng-template>

      </div>

    </div>

    <!-- RIGHT: SUMMARY -->
    <div class="col-lg-4">

      <div class="card shadow-lg border-0 sticky-top" style="top: 20px;">

        <div class="card-body">

          <h5 class="fw-bold mb-3">Tóm tắt đơn hàng</h5>

          <div class="d-flex justify-content-between mb-2">
            <span>Tạm tính</span>
            <span>{{fomatPrice(subTotal)}} đ</span>
          </div>

          <hr>

          <div class="d-flex justify-content-between fs-5 fw-bold mb-3">
            <span>Tổng</span>
             <span class="text-danger">
              {{fomatPrice(finalTotal)}} đ
            </span>
          </div>

          <button class="btn btn-danger w-100 py-2 fw-bold"
            (click)="goCheckOut()"
          >
              
            THANH TOÁN
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
