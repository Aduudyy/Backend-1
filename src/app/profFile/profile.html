<main class="profile-container">
  <aside class="sidebar">
    <div class="avatar-section">
      <div class="avatar-circle">
        <img width="90px" src="assets/images/user.png" alt="">
      </div>
      <div class="sidebar-menu">
        <div class="menu-item">Tài khoản</div>
        <div class="menu-item active">Thông tin cá nhân</div>
        <div class="menu-item">Lịch sử mua hàng</div>
      </div>
    </div>
  </aside>

  <section class="content-area">
    <div class="profile-card">
      <div class="form-container">
        <div class="form-row">
          <div class="form-group">
            <label>Họ</label>
            <input type="text" class="input-field">
          </div>
          <div class="form-group">
            <label>Tên</label>
            <input type="text" class="input-field">
          </div>
        </div>

        <div class="form-group full-width">
          <label>Email</label>
          <input type="email" class="input-field">
        </div>

        <div class="form-group full-width">
          <label>Số điện thoại</label>
          <input type="tel" class="input-field">
        </div>

        <div class="form-group full-width">
          <label>Địa chỉ</label>
          <input type="text" class="input-field">
        </div>

        <div class="form-actions">
          <button class="btn btn-outline">Chỉnh sửa</button>
          <button class="btn btn-solid">Lưu trữ</button>
        </div>
      </div>
    </div>
  </section>
</main>
