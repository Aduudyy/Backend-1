  <h2 class="fw-bold mb-4">Sản phẩm đã mua</h2>
<div class="container mt-4">


  @if (orders.length > 0) {
    @for (item of orders; track item.id) {
      <div class="card mb-3 shadow-sm border-0">
        <div class="card-body p-3">
          <div class="d-flex align-items-center">
            <img [src]="'../../assets/images/SanPham/' + item.images"
                 style="width: 80px; height: 80px; object-fit: cover;" 
                 class="rounded border me-3">
            <div class="flex-grow-1">
              <div class="d-flex justify-content-between">
                <h6 class="fw-bold mb-1">{{ item.name }}</h6>
                <span class="badge rounded-pill bg-warning text-dark" style="font-size: 0.7rem;">
                  {{ item.status }}
                </span>
              </div>
              <div class="text-muted small">Mã đơn: ABC_{{ item.id }}</div>
              <div class="text-muted small">Ngày đặt: {{ item.date | date:'dd/MM/yyyy' }}</div>
              <div class="d-flex justify-content-between align-items-center mt-2">
                <div class="text-muted small">Số lượng: x{{ item.quanity }}</div>
                <div class="fw-bold text-danger">{{ item.price | number }}đ</div>
              </div>
              <div style="cursor: pointer;" (click)="clearHistory(item.id)">Xoá</div>
            </div>
          </div>
        </div>
      </div>
    }
  } @else {
    <div class="text-center py-5">
      <p class="text-muted">Bạn chưa mua sản phẩm nào.</p>
    </div>
  }
</div>
