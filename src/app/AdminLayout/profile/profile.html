<div class="container-fluid py-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">

    <div>
      <h3 class="fw-bold mb-1">Danh sách tài khoản</h3>
      <p class="text-muted mb-0">Dữ liệu lấy từ API</p>
    </div>

    <button class="btn btn-primary rounded-3 px-4">
      + Thêm tài khoản
    </button>

  </div>

  <!-- FILTER (optional giữ lại nếu bạn cần) -->
  <div class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body">

      <div class="row g-3">

        <div class="col-lg-6">
          <input
            type="text"
            class="form-control rounded-3"
            placeholder="Tìm kiếm tên hoặc số điện thoại..."
          />
        </div>

        <div class="col-lg-3">
          <select class="form-select rounded-3">
            <option value="">Tất cả role</option>
            <option>Admin</option>
            <option>Staff</option>
          </select>
        </div>

        <div class="col-lg-3">
          <button class="btn btn-dark w-100 rounded-3">
            Lọc
          </button>
        </div>

      </div>

    </div>
  </div>

  <!-- KHUNG CHỨA LIST -->
  <div class="card border-0 shadow-sm rounded-4">

  <div class="card-body p-0">

    <div class="table-responsive">

      <table class="table align-middle mb-0">

        <!-- HEADER -->
        <thead class="table-light">
          <tr>
            <th style="width: 60px;">#</th>
            <th>Họ tên</th>
            <th>Số điện thoại</th>
            <th>Vai trò</th>
            <th>Trạng thái</th>
            <th class="text-center" style="width: 160px;">Hành động</th>
          </tr>
        </thead>

        <!-- BODY -->
        <tbody>

          <tr *ngFor="let user of user; let i = index">

            <!-- INDEX -->
            <td>{{ i + 1 }}</td>

            <!-- NAME -->
            <td>
              <div class="d-flex align-items-center gap-2">

                <div
                  class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center fw-bold"
                  style="width: 40px; height: 40px;"
                >
                  {{ user.fullName?.charAt(0) }}
                </div>

                <div class="fw-semibold">
                  {{ user.fullName }}
                </div>

              </div>
            </td>

            <!-- PHONE -->
            <td>
              {{ user.numberPhone }}
            </td>

            <!-- ROLE -->
            <td>
              <span
                class="badge"
                [ngClass]="{
                  'text-bg-primary': user.role === 'Admin',
                  'text-bg-warning': user.role === 'Staff',
                  'text-bg-secondary': user.role !== 'Admin' && user.role !== 'Staff'
                }"
              >
                {{ user.role }}
              </span>
            </td>

            <!-- STATUS -->
            <td>
              <span
                [ngClass]="user.isProfile ? 'text-success' : 'text-danger'"
                class="fw-semibold"
              >
                ● {{ user.isProfile ? 'Hoạt động' : 'Đã khóa' }}
              </span>
            </td>

            <!-- ACTION -->
            <td class="text-center">

              <button class="btn btn-sm btn-outline-primary me-2">
                Sửa
              </button>

              <button class="btn btn-sm btn-outline-danger">
                Xóa
              </button>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>

</div>
