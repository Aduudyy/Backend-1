<div class="container-fluid py-4 customer-page">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">

    <div>
      <h2 class="fw-bold mb-1">Khách Hàng / Đại Lý</h2>
      <p class="text-muted mb-0">
        Quản lý khách hàng nhập hàng và đại lý bán buôn
      </p>
    </div>

    <button class="btn btn-primary px-4 py-2 rounded-3"
     (click)="openModal()">
      <i class="ri-user-add-line me-2"></i>
      Thêm khách hàng
    </button>

  </div>

  <!-- FILTER -->
  <div class="card border-0 shadow-sm rounded-4 mb-4">

    <div class="card-body">

      <div class="row g-3">

        <div class="col-lg-4">
          <label class="form-label fw-semibold">Tìm kiếm</label>

          <div class="search-box">
            <i class="ri-search-line"></i>

            <input
              type="text"
              class="form-control"
              placeholder="Tên cửa hàng, số điện thoại..."
            >
          </div>
        </div>

        <div class="col-lg-2 d-flex align-items-end">
          <button class="btn btn-dark w-100 py-2 rounded-3">
            <i class="ri-filter-3-line me-1"></i>
            Tìm kiếm
          </button>
        </div>

      </div>

    </div>

  </div>
  <!-- TABLE -->
  <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

    <div class="card-header bg-white border-0 py-3 px-4">
      <div class="d-flex justify-content-between align-items-center">

        <h5 class="fw-bold mb-0">Danh sách khách hàng</h5>

     
      </div>
    </div>

    <div class="table-responsive">

      <table class="table align-middle mb-0 customer-table">

        <thead>
          <tr>
            <th>#</th>
            <th>Cửa hàng</th>
            <th>Người đại diện</th>
            <th>Số điện thoại</th>
            <th>Địa chỉ</th>
            <th>Công nợ</th>
            <th class="text-center">Thao tác</th>
          </tr>
        </thead>

        <tbody *ngFor="let c of customer ; let i = index">

          <tr >
            <td>{{i+1}}</td>

            <td>
              <div class="d-flex align-items-center gap-3">
                <div>
                  <h6 class="mb-0 fw-semibold">
                    
                  </h6>

                  <small class="text-muted">
                    {{c.customName}}
                  </small>
                </div>

              </div>
            </td>

            <td>{{c.clientName}}</td>
            <td>{{c.numberPhone}}</td>
            <td>{{c.province}}</td>

            <td>
              <span class="fw-bold text-danger">
                {{c.debt | number:'1.0-0' }}
              </span>
            </td>
            <td>
              <div class="d-flex justify-content-center gap-2">

                <button class="btn-action btn-view">
                  <i class="ri-eye-line"></i>
                </button>

                <button class="btn-action btn-edit">
                  <i class="ri-edit-line"></i>
                </button>

                <button class="btn-action btn-delete">
                  <i class="ri-delete-bin-line"></i>
                </button>

              </div>
            </td>

          </tr>

        </tbody>

      </table>

    </div>
<p-toast></p-toast>
  </div>

</div>
<app-modal-client
  *ngIf="modalACtive"
  [customerForm] = "customerForm",
  (close) = "closeModal()",
  (save) = "addCustomer($event)"
  [provinces]="provinces"
  [wards]="wards"
  (provinceChange)="onProvinceSelected($event)"

>

</app-modal-client>
