<main class="container py-4">
  <div class="row g-4">
    <!-- LEFT: IMAGE -->
    <div class="col-lg-6">
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <img
          class="w-100"
          [src]="'https://localhost:7271' + prod.imageUrl"
          [alt]="prod.productName"
          style="
      max-height: 650px;
      object-fit: contain;
    "
        />
      </div>
    </div>
    <!-- RIGHT: INFO -->
    <div class="col-lg-6">
      <div class="ps-lg-3">
        <!-- TITLE -->
        <h2 class="fw-bold mb-2">{{ prod.productName }}</h2>
        <div class="d-flex align-items-center text-muted mb-3 gap-2">
          <span>⭐ 4.9</span>
          <span>•</span>
          <span>Đã bán: 120+</span>
        </div>
        <hr>
        <!-- PRICE CARD -->
        <div class="p-3 bg-light rounded-4 d-flex justify-content-between align-items-center mb-3">
          <span class="fw-semibold">Giá bán</span>
          <span class="text-danger fw-bold fs-4">
            {{ fomatPrice(prod.sellPrice) }} VND
          </span>
        </div>
        <!-- QUANTITY -->
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span class="fw-semibold">Số lượng</span>
          <div class="input-group shadow-sm" style="width: 140px; border-radius: 12px; overflow: hidden;">
            <button class="btn btn-outline-secondary"
                    (click)="reduceQuanity()"
                    [disabled]="quanity <= 1">
              −
            </button>
            <input type="number"
                   class="form-control text-center border-0"
                   [(ngModel)]="quanity"
                   readonly />

            <button class="btn btn-outline-secondary"
                    (click)="increaseQuanity()">
              +
            </button>
          </div>
        </div>
        <small class="text-muted d-block mb-3">
          {{ quanity }} sản phẩm
        </small>
        <hr>
        <!-- TOTAL -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <span class="fw-semibold fs-6">Tổng thanh toán</span>
          <span class="fw-bold text-dark fs-5">
            {{ thanhTien() }} VND
          </span>
        </div>

<!-- RECOMMEND PRODUCTS -->
<div class="mt-5" *ngIf="recommendProducts.length > 0">
  <h4 class="fw-bold mb-3">Sản phẩm gợi ý</h4>

  <div class="row g-3">
    <div class="col-6 col-md-3" *ngFor="let item of recommendProducts">
      <div class="card border-0 shadow-sm rounded-4 p-2">

        <img
          [src]="'https://localhost:7271' + item.imageUrl"
          style="height:150px; object-fit:contain"
          class="w-100"
        />

        <div class="mt-2">
          <div class="fw-semibold text-truncate">
            {{ item.productName }}
          </div>

          <small class="text-muted">
            {{ fomatPrice(item.sellPrice) }} VND
          </small>

          <button class="btn btn-sm btn-outline-primary w-100 mt-2"
                  (click)="router.navigate(['/product', item.productId])">
            Xem
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
